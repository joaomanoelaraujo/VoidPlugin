# ranks.yml — unifica roles e tags em um único arquivo.
# A ordem importa: o primeiro rank com permissão satisfeita é o rank do player.
# O ÚLTIMO rank deve ser o padrão (permission vazia) — geralmente "membro".
#
# Campos:
#   prefix      — prefixo exibido no chat/tab (suporta &códigos)
#   tag         — tag exibida antes do nome (ex: [DONO]). Opcional: omita ou deixe vazio
#                 para usar somente o prefix sem tag adicional.
#   permission  — permissão LuckPerms que concede este rank (ex: group.dono).
#                 Deixe vazio apenas no rank padrão.
#   broadcast   — true = anuncia entrada no servidor
#   alwaysvisible — true = sempre visível para outros players (ignora /v)
#   fly         — true = permite voar ao entrar

ranks:
  master:
    prefix: "&6[Master] "
    tag: "&6Master "
    permission: "group.master"
    broadcast: true
    alwaysvisible: true
    fly: true
  admin:
    prefix: "&c[Admin] "
    tag: "&cAdmin "
    permission: "group.admin"
    broadcast: true
    alwaysvisible: true
    fly: true
  moderador:
    prefix: "&2[Moderador] "
    tag: "&2Moderador "
    permission: "group.mod"
    broadcast: true
    alwaysvisible: true
    fly: true
  helper:
    prefix: "&e[Ajudante] "
    tag: "&eAjudante "
    permission: "group.helper"
    broadcast: true
    alwaysvisible: true
    fly: true
  youtuber:
    prefix: "&c[YouTuber] "
    tag: "&cYouTuber "
    permission: "group.youtuber"
    broadcast: true
    alwaysvisible: true
    fly: true
  supremo:
    prefix: "&4[Supremo] "
    tag: "&4Supremo "
    permission: "rank.lendario"
    broadcast: true
    alwaysvisible: false
    fly: true
  lendario:
    prefix: "&2[Lendário] "
    tag: "&2Lendário "
    permission: "rank.lendario"
    broadcast: true
    alwaysvisible: false
    fly: true
  heroi:
    prefix: "&5[Herói] "
    tag: "&5[Herói] "
    permission: "rank.heroi"
    broadcast: true
    alwaysvisible: false
    fly: true
  campeao:
    prefix: "&3[Campeão] "
    tag: "&3Campeão "
    permission: "rank.campeao"
    broadcast: true
    alwaysvisible: false
    fly: true
  membro:
    prefix: "&7"
    tag: "§7Membro "
    permission: ""
    broadcast: false
    alwaysvisible: false
    fly: false