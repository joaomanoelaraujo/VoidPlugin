
#  Formato do campo "icon":
#    {color} → &a se disponível, &c se cooldown/sem permissão
#    {name}  → valor do campo "name" abaixo
#
#  Campo "slot" (opcional):
#    Define o slot exato do inventário (0-53) onde este item aparece.
#    Se omitido (ou -1), o item ocupa a próxima posição automática
#    nas colunas centrais (slots 10-16, 19-25, 28-34, 37-43).
#    Útil para deixar itens de rank em slots específicos, separados
#    dos itens comuns.
#
#  Formatos de recompensa:
#    COMANDO>tell {name} Mensagem
#    CASH>1000
#    BEDWARS_COINS>500
#    SKYWARS_COINS>200
# ============================================================

