storage:
  # Tipos disponíveis: MYSQL, HIKARI, SQLITE
  # MYSQL  → conexão simples, sem pool (só para dev/teste)
  # HIKARI → connection pool com reconexão automática (produção)
  # SQLITE → banco local em arquivo (só para dev/teste)
  type: HIKARI

  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""

  hikari:
    max-pool-size: 20
    min-idle: 5
    connection-timeout: 5000
    idle-timeout: 600000
    max-lifetime: 1800000
    keepalive-time: 60000

  sqlite:
    file: database